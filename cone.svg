<svg width="300" height="350" viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">
  <!-- 圆锥侧面（三角形） -->
  <path d="M150,30 L50,280 L250,280 Z" 
        fill="white" stroke="black" stroke-width="2"/>
  
  <!-- 底面（椭圆弧，模拟圆形底面） -->
  <ellipse cx="150" cy="280" rx="100" ry="20" 
           fill="white" stroke="black" stroke-width="2"/>
  
  <!-- 高度（H）的虚线：从顶点(150,30)到底面圆心(150,280) -->
  <line x1="150" y1="30" x2="150" y2="280" 
        stroke="gray" stroke-dasharray="5,5" stroke-width="1"/>
  
  <!-- 底面直径（D）的虚线：从左到右端点，y=280，x范围50~250 -->
  <line x1="50" y1="280" x2="250" y2="280" 
        stroke="gray" stroke-dasharray="5,5" stroke-width="1"/>
  
  <!-- 文字标注：H（高度旁） -->
  <text x="170" y="160" font-family="Arial" font-size="24" fill="red">H</text>
  
  <!-- 文字标注：D（直径旁） -->
  <text x="130" y="270" font-family="Arial" font-size="24" fill="red">D</text>
</svg>